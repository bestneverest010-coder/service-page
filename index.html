<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JJ TVS Baramati</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: #f4f6f9;
}

header {
  background: #2c3e50;
  color: white;
  text-align: center;
  padding: 15px;
  font-size: 20px;
}

.container {
  padding: 15px;
}

.service {
  margin-bottom: 20px;
}

.service h2 {
  color: #2c3e50;
  border-bottom: 2px solid #ddd;
  padding-bottom: 5px;
}

.card {
  background: white;
  padding: 15px;
  margin-top: 10px;
  border-radius: 10px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

.name {
  font-weight: bold;
  font-size: 18px;
}

.buttons {
  margin-top: 10px;
}

button {
  padding: 8px 12px;
  margin-right: 10px;
  border: none;
  border-radius: 5px;
  cursor: pointer;
}

.call {
  background: #27ae60;
  color: white;
}

.whatsapp {
  background: #25D366;
  color: white;
}

.status {
  font-size: 12px;
  margin-top: 5px;
}

.available {
  color: green;
}

.busy {
  color: red;
}
</style>
</head>

<body>

<header>
  📞 JJ TVS Baramati Services 
</header>

<div class="container">
  <div id="staff-container"></div>
</div>

<script>
const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRVcu8V2TmJvvpfKRu0EW4REa1Bb65fRKVExlad2uRx5Ge97Kqc6dMYk3n29sJ6cCYpvDjhGIGMExl_/pub?output=csv";

fetch(sheetURL)
  .then(response => response.text())
  .then(data => {
    const rows = data.split("\n").slice(1);
    const container = document.getElementById("staff-container");

    let currentService = "";

    rows.forEach(row => {
      const cols = row.split(",");
      if(cols.length < 4) return;

      const name = cols[0];
      const service = cols[1];
      const phone = cols[2];
      const status = cols[3];

      // Create service heading if changed
      if(service !== currentService){
        container.innerHTML += `<div class="service"><h2>${service}</h2></div>`;
        currentService = service;
      }

      const card = `
        <div class="card">
          <div class="name">${name}</div>
          <div class="status ${status.toLowerCase()}">${status}</div>
          <div class="buttons">
            <a href="tel:+91${phone}">
              <button class="call">Call</button>
            </a>
            <a href="https://wa.me/91${phone}">
              <button class="whatsapp">WhatsApp</button>
            </a>
          </div>
        </div>
      `;

      container.innerHTML += card;
    });
  });
</script>
  
</body>
</html>
